<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipster liga</title>
<!-- PWA: manifest, boja sistemske trake, ikonica za iOS -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0B1A12">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ===== BOJE I OSNOVA (mobile first) ===== */
  :root{
    --felt-900:#0B1A12;
    --felt-800:#10241A;
    --felt-700:#173226;
    --line:#2A5340;
    --ink:#EAF3ED;
    --ink-dim:#9DB8A9;
    --gold:#E8B93B;
    --paper:#F6F1E4;
    --paper-ink:#2B2A24;
    --paper-dim:#7B7768;
    --win:#1E6E42;
    --loss:#9A392C;
    --nav-h:64px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Inter",system-ui,sans-serif;
    background:var(--felt-900);
    color:var(--ink);
  }
  .shell{max-width:480px;margin:0 auto;min-height:100dvh;position:relative}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  button:focus-visible,input:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  .screen{display:none}
  .screen.visible{display:block}

  /* ===== HEADER ===== */
  header{border-bottom:1px solid var(--line)}
  header.hidden{display:none}
  .header-inner{padding:12px 16px;display:flex;align-items:center;gap:10px}
  .brand{min-width:0}
  .brand .eyebrow{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim)}
  .brand h1{
    font-family:"Oswald",sans-serif;font-weight:600;font-size:18px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .spacer{flex:1}
  .chip{
    display:flex;flex-direction:column;align-items:flex-end;
    padding:5px 10px;border:1px solid var(--line);border-radius:10px;
    background:var(--felt-800);
  }
  .chip .label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim)}
  .chip .value{font-family:"Oswald",sans-serif;font-size:17px;font-weight:600}
  .chip.gold .value{color:var(--gold)}

  .content{padding:18px 16px calc(var(--nav-h) + 28px)}

  /* ===== LOGIN / REGISTRACIJA ===== */
  #screen-login .content{padding-bottom:20px}
  .login-box{padding-top:10vh;text-align:center}
  .login-box .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim)}
  .login-box h1{font-family:"Oswald",sans-serif;font-size:32px;font-weight:600;margin:4px 0 26px}
  .login-box input{
    width:100%;font-size:16px;padding:14px;border-radius:12px;
    border:1px solid var(--line);background:var(--felt-800);color:var(--ink);
    text-align:center;margin-bottom:12px;
  }
  .login-box input::placeholder{color:var(--ink-dim)}
  .login-box input.hidden{display:none}
  .btn-gold{
    display:block;width:100%;
    background:var(--gold);color:#221A05;
    font-family:"Oswald",sans-serif;font-size:16px;font-weight:600;letter-spacing:.06em;
    padding:14px 0;border-radius:12px;text-transform:uppercase;
  }
  .btn-gold:active{filter:brightness(.95)}
  .btn-gold:disabled{opacity:.5}
  .auth-err{color:#E06A5A;font-size:12.5px;min-height:18px;margin-top:10px}
  .auth-switch{
    margin-top:16px;font-size:13px;color:var(--ink-dim);
  }
  .auth-switch button{
    color:var(--gold);text-decoration:underline;text-underline-offset:3px;font-size:13px;
  }

  /* ===== LIGE ===== */
  h2.screen-title{
    font-family:"Oswald",sans-serif;font-weight:500;font-size:13px;
    letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);
    margin:0 0 12px;
  }
  .league-card{
    width:100%;text-align:left;
    background:var(--felt-800);border:1px solid var(--line);border-radius:14px;
    padding:18px;margin-bottom:12px;
    display:flex;align-items:center;gap:12px;
  }
  .league-card:active{border-color:var(--gold)}
  .league-card .lc-info{flex:1;min-width:0}
  .league-card .lc-name{font-family:"Oswald",sans-serif;font-size:19px;font-weight:600}
  .league-card .lc-sub{font-size:12.5px;color:var(--ink-dim);margin-top:4px}
  .league-card .arrow{font-size:20px;color:var(--ink-dim)}
  .btn-ghost{
    display:block;width:100%;text-align:center;
    border:1px dashed var(--line);border-radius:14px;
    padding:16px;font-size:14px;color:var(--ink-dim);
  }
  .logout{
    display:block;margin:30px auto 0;font-size:12.5px;color:var(--ink-dim);
    text-decoration:underline;text-underline-offset:3px;
  }

  /* ===== TIKET ===== */
  .ticket{
    background:var(--paper);color:var(--paper-ink);
    font-family:"Space Mono",monospace;border-radius:6px;
    filter:drop-shadow(0 10px 24px rgba(0,0,0,.35));
  }
  .ticket-head{padding:16px 18px 10px;text-align:center;border-bottom:1px dashed #C9C2AC}
  .ticket-head .t-title{font-weight:700;font-size:15px;letter-spacing:.18em}
  .ticket-head .t-sub{font-size:10.5px;color:var(--paper-dim);margin-top:2px}
  .ticket-body{padding:14px 18px 4px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;color:var(--paper-dim);margin-bottom:4px}
  .field input{
    width:100%;font-family:"Space Mono",monospace;font-size:16px;
    border:1px solid #C9C2AC;border-radius:4px;padding:10px;
    background:#FFFDF6;color:var(--paper-ink);
  }
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .calc{
    display:flex;justify-content:space-between;font-size:12px;
    border-top:1px dashed #C9C2AC;padding-top:10px;margin-top:4px;
  }
  .calc .win-val{font-weight:700;font-size:15px}
  .err{color:var(--loss);font-size:11px;padding:6px 18px 0;min-height:16px}
  .pay{
    display:block;width:calc(100% - 36px);margin:10px 18px 0;
    background:var(--felt-800);color:var(--gold);
    font-family:"Oswald",sans-serif;font-size:15px;font-weight:600;letter-spacing:.08em;
    padding:13px 0;border-radius:6px;text-transform:uppercase;
  }
  .pay:disabled{opacity:.4}
  .barcode{
    height:34px;margin:14px 18px 16px;opacity:.8;
    background:repeating-linear-gradient(90deg,var(--paper-ink) 0 2px,transparent 2px 5px,var(--paper-ink) 5px 6px,transparent 6px 10px);
  }

  /* ===== LISTA TIPOVA ===== */
  .tip-card{
    background:var(--felt-800);border:1px solid var(--line);border-radius:12px;
    padding:14px;margin-bottom:10px;
  }
  .tip-card.mine{border-color:rgba(232,185,59,.5)}
  .tip-card .player{
    font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--ink-dim);margin-bottom:6px;
  }
  .tip-card.mine .player{color:var(--gold)}
  .tip-card .top-row{display:flex;align-items:flex-start;gap:10px}
  .tip-card .info{flex:1;min-width:0}
  .tip-card .teams{font-weight:600;font-size:15px}
  .tip-card .detail{font-size:12.5px;color:var(--ink-dim);margin-top:3px}
  .tip-card .win{font-family:"Oswald",sans-serif;font-size:18px;font-weight:600;color:var(--gold);white-space:nowrap}
  .badge{font-size:10px;font-weight:600;letter-spacing:.12em;padding:4px 9px;border-radius:4px}
  .badge.won{background:var(--win);color:#D9F0E1}
  .badge.lost{background:var(--loss);color:#F6DCD7}
  .settle{display:flex;gap:8px;margin-top:12px}
  .settle button{
    flex:1;font-size:13px;font-weight:600;padding:10px 0;border-radius:8px;
    border:1px solid var(--line);
  }
  .settle .btn-won:active{border-color:var(--win);color:#5CC989}
  .settle .btn-lost:active{border-color:var(--loss);color:#E06A5A}
  .empty{color:var(--ink-dim);font-size:13px}

  /* ===== LEADERBOARD ===== */
  table{width:100%;border-collapse:collapse;background:var(--felt-800);
    border:1px solid var(--line);border-radius:12px;overflow:hidden}
  thead th{
    font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);
    text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);font-weight:500;
  }
  tbody td{padding:12px;font-size:14px}
  tbody tr.me{background:rgba(232,185,59,.07)}
  td.pos{font-family:"Oswald",sans-serif;font-size:16px;color:var(--gold);width:40px}
  td.pts{font-family:"Oswald",sans-serif;font-size:16px;font-weight:600;color:var(--gold)}
  .right{text-align:right}
  .lb-note{font-size:12.5px;color:var(--ink-dim);margin-top:12px}

  /* ===== DONJI MENI ===== */
  nav.bottom{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;height:var(--nav-h);
    background:var(--felt-800);border-top:1px solid var(--line);
    display:flex;z-index:30;
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.bottom.hidden{display:none}
  .nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;font-size:10.5px;letter-spacing:.04em;color:var(--ink-dim);
  }
  .nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .nav-item.active{color:var(--gold)}

  /* ===== TOAST ===== */
  .toast{
    position:fixed;left:50%;bottom:calc(var(--nav-h) + 16px);
    transform:translateX(-50%) translateY(20px);
    background:var(--paper);color:var(--paper-ink);font-size:13px;font-weight:500;
    padding:11px 20px;border-radius:8px;opacity:0;pointer-events:none;
    transition:opacity .25s,transform .25s;z-index:40;box-shadow:0 8px 22px rgba(0,0,0,.4);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion: reduce){*{transition:none !important}}
</style>
</head>
<body>
<div class="shell">

  <header id="app-header" class="hidden">
    <div class="header-inner">
      <div class="brand">
        <span class="eyebrow" id="header-eyebrow">Tipster liga</span>
        <h1 id="header-title">—</h1>
      </div>
      <div class="spacer"></div>
      <div class="chip gold">
        <span class="label">Balans</span>
        <span class="value" id="balance-chip">—</span>
      </div>
      <div class="chip">
        <span class="label">Bodovi</span>
        <span class="value" id="points-chip">—</span>
      </div>
    </div>
  </header>

  <!-- ═══════ LOGIN / REGISTRACIJA ═══════ -->
  <section class="screen" id="screen-login">
    <div class="content">
      <div class="login-box">
        <span class="eyebrow">Tipster liga</span>
        <h1 id="auth-title">Prijava</h1>
        <!-- ime se prikazuje samo pri registraciji -->
        <input id="auth-name" class="hidden" type="text" placeholder="Tvoje ime u ligi" autocomplete="nickname">
        <input id="auth-email" type="email" placeholder="Email" autocomplete="email">
        <input id="auth-pass" type="password" placeholder="Lozinka (min 6 znakova)" autocomplete="current-password">
        <button class="btn-gold" id="auth-btn">Prijavi se</button>
        <div class="auth-err" id="auth-err" role="alert"></div>
        <p class="auth-switch">
          <span id="switch-text">Nemaš nalog?</span>
          <button id="switch-btn">Registruj se</button>
        </p>
      </div>
    </div>
  </section>

  <!-- ═══════ LIGE ═══════ -->
  <section class="screen" id="screen-lige">
    <div class="content">
      <h2 class="screen-title">Moje lige</h2>
      <button class="league-card" id="league-open">
        <span class="lc-info">
          <span class="lc-name" style="display:block">Ekipa iz kraja</span>
          <span class="lc-sub" style="display:block" id="league-sub">liga traje</span>
        </span>
        <span class="arrow">→</span>
      </button>
      <button class="btn-ghost" id="league-new">+ Napravi novu ligu</button>
      <button class="logout" id="logout-btn">Odjavi se</button>
    </div>
  </section>

  <!-- ═══════ NOVI TIP ═══════ -->
  <section class="screen" id="screen-novi">
    <div class="content">
      <div class="ticket">
        <div class="ticket-head">
          <div class="t-title">NOVI TIP</div>
          <div class="t-sub" id="ticket-date"></div>
        </div>
        <div class="ticket-body">
          <div class="field">
            <label for="f-match">PAR / UTAKMICA</label>
            <input id="f-match" type="text" placeholder="npr. Real Madrid — Barcelona">
          </div>
          <div class="field">
            <label for="f-pick">TIP</label>
            <input id="f-pick" type="text" placeholder="npr. 1, 0-2 gola, GG...">
          </div>
          <div class="row2">
            <div class="field">
              <label for="f-odds">KVOTA</label>
              <input id="f-odds" type="number" step="0.01" min="1.01" inputmode="decimal" placeholder="2.00">
            </div>
            <div class="field">
              <label for="f-stake">ULOG (tk)</label>
              <input id="f-stake" type="number" min="1" inputmode="numeric" placeholder="10">
            </div>
          </div>
          <div class="calc">
            <span>Mogući dobitak</span>
            <span class="win-val" id="win-val">0 bod.</span>
          </div>
        </div>
        <div class="err" id="form-err" role="alert"></div>
        <button class="pay" id="pay-btn" disabled>Uplati tip</button>
        <div class="barcode" aria-hidden="true"></div>
      </div>
    </div>
  </section>

  <!-- ═══════ TIPOVI ═══════ -->
  <section class="screen" id="screen-tipovi">
    <div class="content">
      <h2 class="screen-title">Tipovi lige</h2>
      <div id="tip-list"><p class="empty">Učitavam...</p></div>
    </div>
  </section>

  <!-- ═══════ LEADERBOARD ═══════ -->
  <section class="screen" id="screen-tabela">
    <div class="content">
      <h2 class="screen-title">Leaderboard</h2>
      <table>
        <thead>
          <tr><th>#</th><th>Igrač</th><th class="right">Bodovi</th><th class="right">Balans</th></tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
      <p class="lb-note">Na tabeli je svako ko je odigrao bar jedan tip.</p>
    </div>
  </section>

  <!-- ═══════ DONJI MENI ═══════ -->
  <nav class="bottom hidden" id="bottom-nav" aria-label="Glavna navigacija">
    <button class="nav-item" data-go="lige" aria-label="Lige">
      <svg viewBox="0 0 24 24"><path d="M8 21h8M12 17v4M7 4h10v5a5 5 0 0 1-10 0V4z"/><path d="M7 6H4a3 3 0 0 0 3 5M17 6h3a3 3 0 0 1-3 5"/></svg>
      Lige
    </button>
    <button class="nav-item" data-go="novi" aria-label="Novi tip">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>
      Novi tip
    </button>
    <button class="nav-item" data-go="tipovi" aria-label="Tipovi">
      <svg viewBox="0 0 24 24"><path d="M5 4h14v16H5z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>
      Tipovi
    </button>
    <button class="nav-item" data-go="tabela" aria-label="Leaderboard">
      <svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M20 20H4"/></svg>
      Tabela
    </button>
  </nav>

  <div class="toast" id="toast" role="status"></div>
</div>

<script>
/* =====================================================
   SUPABASE
   ===================================================== */
const SUPABASE_URL = "https://dmgbddfyjucfnnlhjmbm.supabase.co";
const SUPABASE_KEY = "sb_publishable_JLKEZOoKEwTEQAnmfLqdkA_lpkdUj6L";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const START_BALANCE = 500;
const LEAGUE_NAME = "Ekipa iz kraja";

/* Prijavljeni korisnik: { id, name } ili null.
   Sesiju čuva supabase-js sam (preživi refresh). */
let user = null;
let allTips = [];

const fmt = n => Number(n).toLocaleString("sr-Latn", { maximumFractionDigits: 2 });
const $ = id => document.getElementById(id);

/* =====================================================
   AUTH — registracija i prijava
   ===================================================== */
let authMode = "login"; // "login" ili "register"

function setAuthMode(mode) {
  authMode = mode;
  const reg = mode === "register";
  $("auth-title").textContent = reg ? "Registracija" : "Prijava";
  $("auth-btn").textContent = reg ? "Napravi nalog" : "Prijavi se";
  $("auth-name").classList.toggle("hidden", !reg);
  $("switch-text").textContent = reg ? "Već imaš nalog?" : "Nemaš nalog?";
  $("switch-btn").textContent = reg ? "Prijavi se" : "Registruj se";
  $("auth-err").textContent = "";
}
$("switch-btn").addEventListener("click", () =>
  setAuthMode(authMode === "login" ? "register" : "login"));

$("auth-btn").addEventListener("click", async () => {
  const email = $("auth-email").value.trim();
  const pass = $("auth-pass").value;
  const name = $("auth-name").value.trim();
  const errEl = $("auth-err");
  errEl.textContent = "";

  if (authMode === "register" && !name) { errEl.textContent = "Upiši ime u ligi."; return; }
  if (!email || !pass) { errEl.textContent = "Upiši email i lozinku."; return; }

  $("auth-btn").disabled = true;

  let result;
  if (authMode === "register") {
    /* ime se čuva u metadata naloga — odatle ga čitamo kao display name */
    result = await db.auth.signUp({
      email, password: pass,
      options: { data: { display_name: name } },
    });
  } else {
    result = await db.auth.signInWithPassword({ email, password: pass });
  }
  $("auth-btn").disabled = false;

  if (result.error) {
    errEl.textContent = prevediAuthGresku(result.error.message);
    return;
  }
  if (!result.data.session) {
    /* desi se samo ako je "Confirm email" ostao uključen u dashboardu */
    errEl.textContent = "Provjeri email i potvrdi nalog, pa se prijavi.";
    return;
  }
  setUserFromSession(result.data.session);
  showScreen("lige");
});
$("auth-pass").addEventListener("keydown", e => {
  if (e.key === "Enter") $("auth-btn").click();
});

function prevediAuthGresku(msg) {
  if (msg.includes("Invalid login credentials")) return "Pogrešan email ili lozinka.";
  if (msg.includes("already registered")) return "Nalog s tim emailom već postoji.";
  if (msg.includes("at least 6 characters")) return "Lozinka mora imati bar 6 znakova.";
  return "Greška: " + msg;
}

function setUserFromSession(session) {
  user = {
    id: session.user.id,
    name: session.user.user_metadata.display_name || session.user.email,
  };
}

$("logout-btn").addEventListener("click", async () => {
  await db.auth.signOut();
  user = null;
  showScreen("login");
});

/* =====================================================
   PODACI
   ===================================================== */
async function refreshTips() {
  const { data, error } = await db
    .from("tips")
    .select("*")
    .order("created_at", { ascending: false });
  if (error) { showToast("Greška pri učitavanju: " + error.message); return; }
  allTips = data;
  renderAll();
}

function statsFor(name) {
  const mine = allTips.filter(t => t.player_name === name);
  const spent = mine.reduce((s, t) => s + t.stake, 0);
  const points = mine
    .filter(t => t.status === "won")
    .reduce((s, t) => s + t.stake * Number(t.odds), 0);
  return { balance: START_BALANCE - spent, points };
}

/* =====================================================
   NAVIGACIJA
   ===================================================== */
const IN_LEAGUE = ["novi", "tipovi", "tabela"];

function showScreen(name) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("visible"));
  $("screen-" + name).classList.add("visible");

  $("app-header").classList.toggle("hidden", name === "login");
  $("bottom-nav").classList.toggle("hidden", !IN_LEAGUE.includes(name));

  document.querySelectorAll(".nav-item").forEach(item =>
    item.classList.toggle("active", item.dataset.go === name));

  if (name === "lige") {
    $("header-eyebrow").textContent = "Tipster liga";
    $("header-title").textContent = user ? user.name : "—";
  } else if (IN_LEAGUE.includes(name)) {
    $("header-eyebrow").textContent = user ? user.name : "";
    $("header-title").textContent = LEAGUE_NAME;
  }

  renderAll();
  if (name !== "login") refreshTips();
}
document.querySelectorAll("[data-go]").forEach(btn =>
  btn.addEventListener("click", () => showScreen(btn.dataset.go)));

/* ===== LIGE ===== */
$("league-open").addEventListener("click", () => showScreen("tipovi"));
$("league-new").addEventListener("click", () =>
  showToast("Kreiranje lige stiže kasnije."));

/* ===== HEADER ===== */
function renderHeader() {
  if (!user) return;
  const me = statsFor(user.name);
  $("balance-chip").textContent = fmt(me.balance);
  $("points-chip").textContent = fmt(me.points);

  const players = new Set(allTips.map(t => t.player_name)).size;
  const active = allTips.filter(t => t.status === "active").length;
  $("league-sub").textContent =
    `${players || 1} ${players === 1 ? "igrač" : "igrača"} · ${active} aktivnih tipova`;
}

/* ===== FORMA ZA TIP ===== */
const fMatch = $("f-match"), fPick = $("f-pick"),
      fOdds = $("f-odds"), fStake = $("f-stake");

$("ticket-date").textContent = new Date().toLocaleDateString("sr-Latn");

function validate() {
  const odds = parseFloat(fOdds.value);
  const stake = parseInt(fStake.value, 10);
  const balance = user ? statsFor(user.name).balance : 0;
  let msg = "";
  if (!fMatch.value.trim()) msg = "Upiši par.";
  else if (!fPick.value.trim()) msg = "Upiši tip.";
  else if (!odds || odds < 1.01) msg = "Kvota mora biti bar 1.01.";
  else if (!stake || stake < 1) msg = "Minimalan ulog je 1 token.";
  else if (stake > balance) msg = "Nemaš dovoljno tokena na balansu.";

  const win = (odds >= 1.01 && stake >= 1) ? stake * odds : 0;
  $("win-val").textContent = fmt(win) + " bod.";
  $("form-err").textContent = msg;
  $("pay-btn").disabled = !!msg;
  return !msg;
}
[fMatch, fPick, fOdds, fStake].forEach(el => el.addEventListener("input", validate));

$("pay-btn").addEventListener("click", async () => {
  if (!validate()) return;
  $("pay-btn").disabled = true;

  /* user_id popunjava baza sama (default auth.uid()) —
     zato je nemoguće uplatiti tip u tuđe ime */
  const { error } = await db.from("tips").insert({
    player_name: user.name,
    match_name: fMatch.value.trim(),
    pick: fPick.value.trim(),
    odds: parseFloat(fOdds.value),
    stake: parseInt(fStake.value, 10),
  });

  if (error) {
    showToast("Greška: " + error.message);
    $("pay-btn").disabled = false;
    return;
  }
  fMatch.value = fPick.value = fOdds.value = fStake.value = "";
  showToast("Tip uplaćen. Srećno!");
  await refreshTips();
  showScreen("tipovi");
});

/* ===== TIPOVI SVIH IGRAČA ===== */
function renderTips() {
  const list = $("tip-list");
  if (!allTips.length) {
    list.innerHTML = "<p class='empty'>Još nema tipova u ligi. Budi prvi!</p>";
    return;
  }
  list.innerHTML = allTips.map(t => {
    const mine = user && t.user_id === user.id;
    return `
    <div class="tip-card${mine ? " mine" : ""}">
      <div class="player">${mine ? t.player_name + " (ti)" : t.player_name}</div>
      <div class="top-row">
        <div class="info">
          <div class="teams">${t.match_name}</div>
          <div class="detail">Tip: ${t.pick} · Kvota ${Number(t.odds).toFixed(2)} · Ulog ${t.stake} tk</div>
        </div>
        ${t.status === "active"
          ? `<span class="win">${fmt(t.stake * Number(t.odds))} bod.</span>`
          : `<span class="badge ${t.status}">${t.status === "won" ? "PROŠAO" : "PAO"}</span>`}
      </div>
      ${t.status === "active" && mine ? `
        <div class="settle">
          <button class="btn-won"  data-id="${t.id}" data-res="won">Prošao</button>
          <button class="btn-lost" data-id="${t.id}" data-res="lost">Pao</button>
        </div>` : ""}
    </div>`;
  }).join("");

  list.querySelectorAll(".settle button").forEach(btn => {
    btn.addEventListener("click", async () => {
      const { error } = await db
        .from("tips")
        .update({ status: btn.dataset.res })
        .eq("id", Number(btn.dataset.id));
      if (error) { showToast("Greška: " + error.message); return; }
      await refreshTips();
    });
  });
}

/* ===== LEADERBOARD ===== */
function renderLeaderboard() {
  const names = [...new Set(allTips.map(t => t.player_name))];
  const rows = names
    .map(n => ({ name: n, ...statsFor(n) }))
    .sort((a, b) => b.points - a.points || b.balance - a.balance);

  if (!rows.length) {
    $("lb-body").innerHTML = `<tr><td colspan="4" class="empty" style="padding:14px">Još nema igrača.</td></tr>`;
    return;
  }
  $("lb-body").innerHTML = rows.map((p, i) => `
    <tr class="${user && p.name === user.name ? "me" : ""}">
      <td class="pos">${i + 1}</td>
      <td>${p.name}${user && p.name === user.name ? " (ti)" : ""}</td>
      <td class="pts right">${fmt(p.points)}</td>
      <td class="right">${fmt(p.balance)}</td>
    </tr>`).join("");
}

/* ===== TOAST ===== */
let toastTimer;
function showToast(msg) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
}

function renderAll() {
  renderHeader();
  renderTips();
  renderLeaderboard();
  validate();
}

/* ===== START — provjeri postoji li sačuvana sesija ===== */
(async () => {
  /* registruj service worker (uslov za instalaciju na home screen) */
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  }

  const { data: { session } } = await db.auth.getSession();
  if (session) {
    setUserFromSession(session);
    showScreen("lige");
  } else {
    showScreen("login");
  }
})();
</script>
</body>
</html>
